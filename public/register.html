<!DOCTYPE html>
<html lang="tm">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>СФЕРА — Ýazylmak / Регистрация</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body {
            background: #060911;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
            padding: 30px 20px;
        }

        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .ambient-glow {
            position: fixed;
            border-radius: 50%;
            filter: blur(130px);
            z-index: 0;
            pointer-events: none;
            animation: pulseGlow 10s infinite alternate ease-in-out;
        }

        .glow-1 {
            width: 500px;
            height: 500px;
            background: rgba(0, 255, 163, 0.16);
            top: -120px;
            right: -120px;
        }

        .glow-2 {
            width: 550px;
            height: 550px;
            background: rgba(0, 212, 255, 0.15);
            bottom: -150px;
            left: -150px;
            animation-delay: -5s;
        }

        @keyframes pulseGlow {
            0% { transform: scale(1) translate(0, 0); opacity: 0.6; }
            100% { transform: scale(1.25) translate(-40px, 30px); opacity: 0.95; }
        }

        .auth-container {
            width: 100%;
            max-width: 480px;
            background: rgba(10, 18, 32, 0.65);
            border: 1px solid rgba(0, 255, 163, 0.2);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border-radius: 28px;
            padding: 42px 36px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.7), inset 0 0 20px rgba(0, 255, 163, 0.05);
            position: relative;
            z-index: 2;
            overflow: hidden;
        }

        .auth-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00ffa3, #00d4ff, transparent);
        }

        .auth-header { text-align: center; margin-bottom: 25px; }

        .logo-wrap {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 15px;
            text-decoration: none;
        }

        .logo-svg {
            width: 46px;
            height: 46px;
            filter: drop-shadow(0 0 12px rgba(0,255,163,0.6));
            animation: logoFloat 4s ease-in-out infinite alternate;
        }

        @keyframes logoFloat {
            0% { transform: translateY(0); }
            100% { transform: translateY(-5px); }
        }

        .logo-text h2 {
            font-size: 24px;
            font-weight: 900;
            background: linear-gradient(135deg, #00ffa3, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-text p { font-size: 10px; color: #9fb5c8; text-transform: uppercase; letter-spacing: 1px; }

        .auth-title { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 6px; }
        .auth-subtitle { font-size: 13px; color: #8a9eb2; }

        .lang-switch-top { position: absolute; top: 20px; right: 20px; z-index: 10; }
        .lang-btn {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            padding: 7px 14px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 700;
            backdrop-filter: blur(10px);
            transition: 0.3s;
        }
        .lang-btn:hover {
            background: rgba(0, 255, 163, 0.2);
            border-color: #00ffa3;
            box-shadow: 0 0 15px rgba(0, 255, 163, 0.4);
        }

        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 12px; color: #b0c4de; margin-bottom: 6px; font-weight: 500; }

        .form-input, .form-select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 14px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-select option { background: #0c1424; color: #fff; }

        .form-input:focus, .form-select:focus {
            border-color: #00ffa3;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 20px rgba(0, 255, 163, 0.3);
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #00ffa3 0%, #00b894 100%);
            border: none;
            border-radius: 14px;
            color: #060911;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(0, 255, 163, 0.35);
            margin-top: 10px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 30px rgba(0, 255, 163, 0.55);
            filter: brightness(1.1);
        }

        .auth-footer { margin-top: 22px; text-align: center; font-size: 13px; color: #8a9eb2; }
        .auth-footer a { color: #00ffa3; text-decoration: none; font-weight: 600; margin-left: 5px; transition: 0.2s; }
        .auth-footer a:hover { color: #00d4ff; text-shadow: 0 0 8px rgba(0, 212, 255, 0.5); }

        .message {
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            margin-bottom: 15px;
            display: none;
            text-align: center;
        }
        .message.error { background: rgba(255, 77, 77, 0.15); border: 1px solid rgba(255, 77, 77, 0.4); color: #ff6b6b; }
        .message.success { background: rgba(0, 255, 163, 0.15); border: 1px solid rgba(0, 255, 163, 0.4); color: #00ffa3; }

        #adminKeyGroup { display: none; }
    </style>
</head>
<body>

    <!-- Фоновые визуальные эффекты -->
    <canvas id="bgCanvas"></canvas>
    <div class="ambient-glow glow-1"></div>
    <div class="ambient-glow glow-2"></div>

    <div class="lang-switch-top">
        <button class="lang-btn" id="langBtn">TM</button>
    </div>

    <div class="auth-container">
        <div class="auth-header">
            <a href="index.html" class="logo-wrap">
                <svg class="logo-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#00ffa3"/>
                            <stop offset="50%" stop-color="#00d4ff"/>
                            <stop offset="100%" stop-color="#1f6bff"/>
                        </linearGradient>
                    </defs>
                    <circle cx="50" cy="50" r="28" fill="url(#logoGrad)" opacity="0.15"/>
                    <path d="M50 12 C72 12, 88 28, 88 50 C88 72, 68 88, 46 86 C26 84, 14 66, 16 46 C18 28, 34 16, 52 18 C68 20, 78 34, 76 50 C74 64, 62 74, 48 72 C36 70, 28 58, 30 46 C32 36, 42 28, 52 30 C60 32, 66 40, 64 50 C62 58, 54 62, 46 60" stroke="url(#logoGrad)" stroke-width="3"/>
                    <circle cx="48" cy="48" r="3.5" fill="#ffffff"/>
                </svg>
                <div class="logo-text">
                    <h2>SFERA</h2>
                    <p>Milli Platforma</p>
                </div>
            </a>
            <h1 class="auth-title" data-i18n="reg_title">Hasap döretmek</h1>
            <p class="auth-subtitle" data-i18n="reg_subtitle">SFERA ekosistemasyna goşulyň</p>
        </div>

        <div id="message" class="message"></div>

        <form id="registerForm">
            <div class="form-group">
                <label data-i18n="reg_name_label">Ulanyjy ady / ФИО</label>
                <input type="text" id="username" class="form-input" placeholder="Araz Arazow" required />
            </div>

            <div class="form-group">
                <label data-i18n="reg_email_label">Email adres</label>
                <input type="email" id="email" class="form-input" placeholder="user@example.com" required />
            </div>

            <div class="form-group">
                <label data-i18n="reg_type_label">Категория участника</label>
                <select id="userType" class="form-select">
                    <option value="private">Частное лицо (C2C / B2C)</option>
                    <option value="business">Предприниматель / Компания (B2B)</option>
                    <option value="gov">Государственная структура (B2G)</option>
                </select>
            </div>

            <div class="form-group">
                <label data-i18n="reg_role_label">Права доступа</label>
                <select id="role" class="form-select">
                    <option value="user">Пользователь / Покупатель</option>
                    <option value="admin">Администратор системы</option>
                </select>
            </div>

            <div class="form-group" id="adminKeyGroup">
                <label style="color:#00ffa3;">Секретный ключ администратора</label>
                <input type="password" id="adminKey" class="form-input" placeholder="Ключ доступа (admin123)" />
            </div>

            <div class="form-group">
                <label data-i18n="reg_password_label">Parol</label>
                <input type="password" id="password" class="form-input" value="99363645817" required />
            </div>

            <button type="submit" class="btn-submit" id="regBtn" data-i18n="reg_button">Ýazylmak</button>
        </form>

        <div class="auth-footer">
            <span data-i18n="reg_has_account">Eýýäm hasabyňyz barmy?</span>
            <a href="login.html" data-i18n="reg_login_link">Girmek</a>
        </div>
    </div>

    <script>
        // Анимация частичек Canvas
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        const particles = [];
        const particleCount = 55;

        for (let i = 0; i < particleCount; i++) {
            particles.push({
                x: Math.random() * width,
                y: Math.random() * height,
                vx: (Math.random() - 0.5) * 0.7,
                vy: (Math.random() - 0.5) * 0.7,
                radius: Math.random() * 2 + 1,
                color: Math.random() > 0.5 ? '#00ffa3' : '#00d4ff'
            });
        }

        function drawParticles() {
            ctx.clearRect(0, 0, width, height);

            for (let i = 0; i < particleCount; i++) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;

                if (p.x < 0 || p.x > width) p.vx *= -1;
                if (p.y < 0 || p.y > height) p.vy *= -1;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.shadowColor = p.color;
                ctx.shadowBlur = 10;
                ctx.fill();

                for (let j = i + 1; j < particleCount; j++) {
                    let p2 = particles[j];
                    let dist = Math.hypot(p.x - p2.x, p.y - p2.y);
                    if (dist < 130) {
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.strokeStyle = `rgba(0, 255, 163, ${1 - dist / 130 * 0.8})`;
                        ctx.lineWidth = 0.6;
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(drawParticles);
        }
        drawParticles();

        const translations = {
            tm: {
                reg_title: "Hasap döretmek",
                reg_subtitle: "SFERA ekosistemasyna goşulyň",
                reg_name_label: "Ulanyjy ady / Аdy",
                reg_email_label: "Email adres",
                reg_type_label: "Katagoriýasy",
                reg_role_label: "Ulanyjy roly",
                reg_password_label: "Parol",
                reg_button: "Ýazylmak",
                reg_has_account: "Eýýäm hasabyňyz barmy?",
                reg_login_link: "Girmek",
                reg_success: "Hasap döredildi! Giriş sahypasyna geçirilýär...",
                reg_error_email: "Bu email eýýäm bellige alnan!"
            },
            ru: {
                reg_title: "Регистрация",
                reg_subtitle: "Присоединяйтесь к экосистеме SFERA",
                reg_name_label: "Имя пользователя / Организация",
                reg_email_label: "Электронная почта",
                reg_type_label: "Тип контрагента",
                reg_role_label: "Роль в системе",
                reg_password_label: "Пароль",
                reg_button: "Зарегистрироваться",
                reg_has_account: "Уже есть аккаунт?",
                reg_login_link: "Войти",
                reg_success: "Регистрация успешна! Переход на вход...",
                reg_error_email: "Этот email уже зарегистрирован!"
            },
            en: {
                reg_title: "Registration",
                reg_subtitle: "Join the SFERA ecosystem",
                reg_name_label: "Full Name / Organization",
                reg_email_label: "Email Address",
                reg_type_label: "Account Type",
                reg_role_label: "System Role",
                reg_password_label: "Password",
                reg_button: "Register Now",
                reg_has_account: "Already have an account?",
                reg_login_link: "Sign In",
                reg_success: "Registration successful! Redirecting...",
                reg_error_email: "This email is already registered!"
            }
        };

        let currentLang = localStorage.getItem('lang') || 'tm';

        function setLanguage(lang) {
            if (!translations[lang]) return;
            currentLang = lang;
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang][key]) el.textContent = translations[lang][key];
            });
            document.getElementById('langBtn').textContent = lang.toUpperCase();
            localStorage.setItem('lang', lang);
        }

        document.getElementById('langBtn').addEventListener('click', function() {
            const cycle = ['tm', 'ru', 'en'];
            let idx = cycle.indexOf(currentLang);
            idx = (idx + 1) % cycle.length;
            setLanguage(cycle[idx]);
        });

        document.getElementById('role').addEventListener('change', function() {
            document.getElementById('adminKeyGroup').style.display = this.value === 'admin' ? 'block' : 'none';
        });

        const form = document.getElementById('registerForm');
        const messageEl = document.getElementById('message');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const userType = document.getElementById('userType').value;
            const roleSelect = document.getElementById('role').value;
            const adminKey = document.getElementById('adminKey').value.trim();
            const password = document.getElementById('password').value.trim() || '99363645817';

            if (!username || !email) return;

            let role = 'user';
            if (roleSelect === 'admin' || email.toLowerCase() === 'admin@dtm.tm') {
                if (adminKey !== 'admin123' && email.toLowerCase() !== 'admin@dtm.tm') {
                    showMessage('Неверный ключ администратора! (Ключ: admin123)', 'error');
                    return;
                }
                role = 'admin';
            }

            let users = JSON.parse(localStorage.getItem('users') || '[]');
            
            if (users.some(u => u.email.toLowerCase() === email.toLowerCase())) {
                showMessage(translations[currentLang].reg_error_email, 'error');
                return;
            }

            users.push({
                id: 'usr_' + Date.now(),
                username,
                email,
                password,
                role,
                userType,
                createdAt: new Date().toISOString()
            });

            localStorage.setItem('users', JSON.stringify(users));

            showMessage(translations[currentLang].reg_success, 'success');
            setTimeout(() => { window.location.href = 'login.html'; }, 1200);
        });

        function showMessage(text, type) {
            messageEl.textContent = text;
            messageEl.className = 'message ' + type;
            messageEl.style.display = 'block';
            setTimeout(() => { messageEl.style.display = 'none'; }, 4000);
        }

        setLanguage(currentLang);
    </script>
</body>
</html>
