<body>
    <!-- ... весь HTML как в предыдущей версии ... -->
    <script>
        // ============================================================
        // ПЕРЕВОДЫ (как раньше)
        // ============================================================
        const translations = { ... }; // (полный объект переводов)

        // ============================================================
        // ЛОГИКА РЕГИСТРАЦИИ (исправленная)
        // ============================================================
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const roleSelect = document.getElementById('role');
            const selectedRole = roleSelect.value; // "user" или "admin"
            const adminKey = document.getElementById('adminKey').value.trim();

            // Проверки
            if (!username || !email || !password) { /* show error */ return; }
            if (selectedRole === 'admin' && adminKey !== 'admin123') { /* show error */ return; }

            // Сохраняем роль явно
            const role = (selectedRole === 'admin') ? 'admin' : 'user';

            const users = JSON.parse(localStorage.getItem('users') || '[]');
            if (users.some(u => u.email === email)) { /* show error */ return; }

            const newUser = {
                id: 'u' + Date.now(),
                username,
                email,
                password,
                role: role, // <--- ОБЯЗАТЕЛЬНО role, а не selectedRole
                createdAt: new Date().toISOString()
            };
            users.push(newUser);
            localStorage.setItem('users', JSON.stringify(users));

            // Сразу сохраняем текущего пользователя (для входа)
            localStorage.setItem('user', JSON.stringify({
                id: newUser.id,
                username: newUser.username,
                email: newUser.email,
                role: newUser.role
            }));

            showMessage('Hasap döredildi!', 'success');
            setTimeout(() => window.location.href = 'dashboard.html', 1500);
        });
    </script>
</body>
