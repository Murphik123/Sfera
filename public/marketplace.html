<!DOCTYPE html>
<html lang="tm">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>СФЕРА — Marketpleýs</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="/css/style.css" />

    <style>
        .marketplace {
            padding: 120px 7% 60px;
            min-height: 100vh;
        }
        .marketplace-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }
        .marketplace-header h1 {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(to right, #fff, #b4d7ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .marketplace-header .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: .3s;
            text-decoration: none;
            display: inline-block;
            font-size: 14px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #00d4ff, #008cff);
            color: white;
            box-shadow: 0 10px 30px rgba(0,212,255,.25);
        }
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(0,212,255,.4);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid rgba(255,255,255,.25);
            color: white;
        }
        .btn-outline:hover {
            background: rgba(255,255,255,.1);
            border-color: #00d4ff;
        }
        .btn-danger {
            background: rgba(255,0,0,.15);
            border: 1px solid rgba(255,0,0,.3);
            color: #ff6b6b;
        }
        .btn-danger:hover {
            background: rgba(255,0,0,.25);
        }

        .listings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }
        .listing-card {
            background: rgba(255,255,255,.06);
            border: 1px solid rgba(255,255,255,.12);
            backdrop-filter: blur(25px);
            border-radius: 18px;
            padding: 20px;
            transition: .35s;
            color: white;
            text-decoration: none;
            display: flex;
            flex-direction: column;
        }
        .listing-card:hover {
            transform: translateY(-6px);
            border-color: #00d4ff;
            box-shadow: 0 25px 50px rgba(0,212,255,.15);
        }
        .listing-card .title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .listing-card .price {
            font-size: 22px;
            font-weight: 600;
            color: #00d4ff;
            margin-bottom: 10px;
        }
        .listing-card .description {
            color: #bdd0df;
            font-size: 14px;
            line-height: 1.5;
            flex-grow: 1;
        }
        .listing-card .seller {
            font-size: 12px;
            color: #9fb5c8;
            margin-top: 12px;
            border-top: 1px solid rgba(255,255,255,.08);
            padding-top: 10px;
        }
        .listing-card .status {
            display: inline-block;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            margin-top: 8px;
            align-self: flex-start;
        }
        .status-active {
            background: rgba(0,255,170,.15);
            color: #00ffa3;
        }
        .status-sold {
            background: rgba(255,0,0,.15);
            color: #ff6b6b;
        }
        .status-archived {
            background: rgba(255,255,255,.1);
            color: #9fb5c8;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,.6);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: rgba(13,28,41,.95);
            border: 1px solid rgba(255,255,255,.15);
            border-radius: 24px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 30px 80px rgba(0,0,0,.5);
        }
        .modal-content h2 {
            margin-bottom: 20px;
            font-size: 28px;
        }
        .modal-content .form-group {
            margin-bottom: 16px;
        }
        .modal-content .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #dbe9ff;
            margin-bottom: 6px;
        }
        .modal-content .form-group input,
        .modal-content .form-group textarea,
        .modal-content .form-group select {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,.15);
            background: rgba(255,255,255,.05);
            color: white;
            font-size: 15px;
            transition: .3s;
            outline: none;
        }
        .modal-content .form-group input:focus,
        .modal-content .form-group textarea:focus,
        .modal-content .form-group select:focus {
            border-color: #00d4ff;
            box-shadow: 0 0 20px rgba(0,212,255,.1);
        }
        .modal-content .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        .modal-content .form-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 20px;
        }
        .modal-content .form-actions .btn {
            min-width: 100px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #bdd0df;
        }
        .empty-state .icon {
            font-size: 60px;
            margin-bottom: 20px;
        }
        .empty-state h3 {
            font-size: 24px;
            margin-bottom: 10px;
            color: white;
        }

        @media (max-width: 768px) {
            .marketplace-header { flex-direction: column; align-items: stretch; gap: 15px; }
            .marketplace-header .actions { justify-content: center; }
            .listings-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div id="particles"></div>

    <header>
        <div class="container">
            <a href="index.html" class="logo">
                <div class="logo-icon">
                    <svg class="logo-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#00ffa3" />
                                <stop offset="50%" stop-color="#00d4ff" />
                                <stop offset="100%" stop-color="#1f6bff" />
                            </linearGradient>
                            <filter id="logoGlow" x="-30%" y="-30%" width="160%" height="160%">
                                <feGaussianBlur stdDeviation="4" result="blur" />
                                <feComposite in="SourceGraphic" in2="blur" operator="over" />
                            </filter>
                        </defs>
                        <circle cx="50" cy="50" r="28" fill="url(#logoGrad)" opacity="0.15" filter="url(#logoGlow)" />
                        <g filter="url(#logoGlow)">
                            <circle cx="50" cy="50" r="40" stroke="url(#logoGrad)" stroke-width="2.5" stroke-dasharray="1 5" stroke-linecap="round" opacity="0.4" />
                            <path d="M50 12 C72 12, 88 28, 88 50 C88 72, 68 88, 46 86 C26 84, 14 66, 16 46 C18 28, 34 16, 52 18 C68 20, 78 34, 76 50 C74 64, 62 74, 48 72 C36 70, 28 58, 30 46 C32 36, 42 28, 52 30 C60 32, 66 40, 64 50 C62 58, 54 62, 46 60" stroke="url(#logoGrad)" stroke-width="3" stroke-linecap="round" stroke-dasharray="1 6" />
                            <circle cx="48" cy="48" r="3.5" fill="#ffffff" filter="url(#logoGlow)" />
                        </g>
                    </svg>
                </div>
                <div class="logo-text">
                    <h2>SFERA</h2>
                    <p>Milli Sanly Platforma</p>
                </div>
            </a>

            <div class="header-right" style="display:flex; align-items:center; gap:12px;">
                <span class="user-info" id="userDisplay">👤 <strong id="username">User</strong></span>
                <a href="dashboard.html" class="btn btn-outline" style="padding:8px 16px; font-size:13px;">← Dashboard</a>
                <button class="lang" id="langBtn">TM</button>
                <button class="logout-btn" id="logoutBtn" style="background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.15); color:white; padding:8px 16px; border-radius:12px; cursor:pointer;">Çykmak</button>
            </div>
        </div>
    </header>

    <section class="marketplace">
        <div class="container">
            <div class="marketplace-header">
                <h1>🛒 Marketpleýs</h1>
                <div class="actions">
                    <button class="btn btn-primary" id="createListingBtn">+ Täze bildiriş</button>
                    <button class="btn btn-outline" id="refreshBtn">⟳ Täzele</button>
                </div>
            </div>

            <div id="listingsContainer">
                <div class="empty-state" id="loadingState">
                    <div class="icon">⏳</div>
                    <h3>Ýüklenýär...</h3>
                </div>
                <!-- Карточки будут вставлены сюда -->
                <div class="listings-grid" id="listingsGrid" style="display:none;"></div>
                <div class="empty-state" id="emptyState" style="display:none;">
                    <div class="icon">📭</div>
                    <h3>Hiç hili bildiriş ýok</h3>
                    <p>Ilkinji bildirişi goşuň!</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Модальное окно создания объявления -->
    <div class="modal" id="createModal">
        <div class="modal-content">
            <h2>Täze bildiriş</h2>
            <form id="createForm">
                <div class="form-group">
                    <label for="title">Ady</label>
                    <input type="text" id="title" name="title" required placeholder="Mysal: Samsung Galaxy S23" />
                </div>
                <div class="form-group">
                    <label for="description">Beýany</label>
                    <textarea id="description" name="description" placeholder="Bildirişiň jikme-jigi..." rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label for="price">Bahasy (TMT)</label>
                    <input type="number" id="price" name="price" step="0.01" required placeholder="1000" />
                </div>
                <div class="form-group">
                    <label for="category">Kategoriýa</label>
                    <input type="text" id="category" name="category" placeholder="Elektronika, Awtoulag..." />
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-outline" id="cancelModalBtn">Ýatyr</button>
                    <button type="submit" class="btn btn-primary">Goşmak</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ============================================================
        // НАСТРОЙКА API
        // ============================================================
        const API_BASE_URL = 'https://sfera-1.onrender.com';
        const token = localStorage.getItem('token');

        // Если нет токена – редирект на логин
        if (!token) {
            window.location.href = 'login.html';
        }

        // ============================================================
        // ПЕРЕВОДЫ (для кнопок)
        // ============================================================
        const translations = {
            tm: { logout: "Çykmak", create: "Täze bildiriş", refresh: "Täzele", cancel: "Ýatyr", submit: "Goşmak" },
            ru: { logout: "Выйти", create: "Новое объявление", refresh: "Обновить", cancel: "Отмена", submit: "Добавить" },
            en: { logout: "Logout", create: "New listing", refresh: "Refresh", cancel: "Cancel", submit: "Add" }
        };
        let currentLang = localStorage.getItem('lang') || 'tm';

        function setLanguage(lang) {
            if (!translations[lang]) return;
            currentLang = lang;
            document.getElementById('langBtn').textContent = lang.toUpperCase();
            document.getElementById('logoutBtn').textContent = translations[lang].logout;
            document.getElementById('createListingBtn').textContent = '+ ' + translations[lang].create;
            document.getElementById('refreshBtn').textContent = '⟳ ' + translations[lang].refresh;
            document.getElementById('cancelModalBtn').textContent = translations[lang].cancel;
            document.querySelector('#createForm button[type="submit"]').textContent = translations[lang].submit;
            localStorage.setItem('lang', lang);
        }

        document.getElementById('langBtn').addEventListener('click', function() {
            const cycle = ['tm', 'ru', 'en'];
            let idx = cycle.indexOf(currentLang);
            idx = (idx + 1) % cycle.length;
            setLanguage(cycle[idx]);
        });

        // ============================================================
        // ЗАГРУЗКА ПОЛЬЗОВАТЕЛЯ
        // ============================================================
        const userData = JSON.parse(localStorage.getItem('user') || '{"username":"Guest"}');
        document.getElementById('username').textContent = userData.username || 'User';

        // ============================================================
        // ВЫХОД
        // ============================================================
        document.getElementById('logoutBtn').addEventListener('click', function() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        });

        // ============================================================
        // ЗАГРУЗКА СПИСКА ОБЪЯВЛЕНИЙ
        // ============================================================
        const listingsGrid = document.getElementById('listingsGrid');
        const loadingState = document.getElementById('loadingState');
        const emptyState = document.getElementById('emptyState');

        async function loadListings() {
            try {
                loadingState.style.display = 'block';
                listingsGrid.style.display = 'none';
                emptyState.style.display = 'none';

                const response = await fetch(`${API_BASE_URL}/api/marketplace/listings`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                if (!response.ok) throw new Error('Network response was not ok');
                const data = await response.json();

                loadingState.style.display = 'none';

                if (data.length === 0) {
                    emptyState.style.display = 'block';
                    return;
                }

                listingsGrid.innerHTML = data.map(listing => `
                    <div class="listing-card">
                        <div class="title">${escapeHtml(listing.title)}</div>
                        <div class="price">${Number(listing.price).toLocaleString()} TMT</div>
                        ${listing.description ? `<div class="description">${escapeHtml(listing.description)}</div>` : ''}
                        <div class="seller">Satyjy: ${listing.seller?.username || 'Unknown'} • ${new Date(listing.createdAt).toLocaleDateString()}</div>
                        <span class="status status-${listing.status}">${listing.status}</span>
                    </div>
                `).join('');
                listingsGrid.style.display = 'grid';
            } catch (error) {
                console.error('Error loading listings:', error);
                loadingState.style.display = 'none';
                emptyState.style.display = 'block';
                emptyState.querySelector('h3').textContent = 'Ýüklenende säwlik';
                emptyState.querySelector('p').textContent = 'Täzeden synanyşyň.';
            }
        }

        // Простой эскейп для безопасности
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ============================================================
        // СОЗДАНИЕ ОБЪЯВЛЕНИЯ
        // ============================================================
        const modal = document.getElementById('createModal');
        const createBtn = document.getElementById('createListingBtn');
        const cancelBtn = document.getElementById('cancelModalBtn');
        const createForm = document.getElementById('createForm');

        createBtn.addEventListener('click', () => modal.classList.add('active'));
        cancelBtn.addEventListener('click', () => modal.classList.remove('active'));
        modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('active'); });

        createForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(createForm);
            const data = {
                title: formData.get('title'),
                description: formData.get('description'),
                price: parseFloat(formData.get('price')),
                category: formData.get('category') || undefined
            };

            try {
                const response = await fetch(`${API_BASE_URL}/api/marketplace/listings`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(data)
                });
                if (!response.ok) throw new Error('Failed to create listing');
                modal.classList.remove('active');
                createForm.reset();
                await loadListings(); // перезагружаем список
            } catch (error) {
                console.error('Error creating listing:', error);
                alert('Bildiriş goşulmady. Täzeden synanyşyň.');
            }
        });

        // ============================================================
        // ОБНОВЛЕНИЕ
        // ============================================================
        document.getElementById('refreshBtn').addEventListener('click', loadListings);

        // ============================================================
        // ЧАСТИЦЫ
        // ============================================================
        const particles = document.getElementById('particles');
        if (particles && particles.children.length === 0) {
            for (let i = 0; i < 60; i++) {
                const p = document.createElement('span');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.top = Math.random() * 100 + '%';
                p.style.animationDuration = (6 + Math.random() * 12) + 's';
                p.style.animationDelay = Math.random() * 5 + 's';
                particles.appendChild(p);
            }
        }

        // ============================================================
        // ИНИЦИАЛИЗАЦИЯ
        // ============================================================
        setLanguage(currentLang);
        loadListings();
        console.log('Marketplace page loaded');
    </script>
</body>
</html>
