        // Сначала пробуем взять из localStorage
        let currentUser = JSON.parse(localStorage.getItem('user') || '{"username":"Guest","email":"guest@example.com","role":"user"}');
        console.log('🔍 Текущий пользователь из localStorage:', currentUser);

        // Проверяем, есть ли в списке users запись с таким email, и если там роль admin, обновляем (на случай, если пользователь зарегистрирован как админ, но в user еще не обновилось)
        const users = JSON.parse(localStorage.getItem('users') || '[]');
        const freshUser = users.find(u => u.email === currentUser.email);
        if (freshUser && freshUser.role === 'admin') {
            // Если в списке users у этого пользователя роль admin, обновляем текущего
            currentUser = {
                id: freshUser.id,
                username: freshUser.username,
                email: freshUser.email,
                role: freshUser.role
            };
            localStorage.setItem('user', JSON.stringify(currentUser));
            console.log('✅ Обновлён пользователь из списка users:', currentUser);
        } else if (freshUser) {
            // Если пользователь найден, но роль не admin, оставляем как есть (может быть user)
            console.log('ℹ️ Пользователь найден, но роль не admin:', freshUser.role);
        } else {
            console.log('ℹ️ Пользователь не найден в списке users, оставляем как есть.');
        }

        const isAdmin = currentUser.role === 'admin';
        console.log('📌 Итоговая роль:', currentUser.role, 'isAdmin:', isAdmin);
