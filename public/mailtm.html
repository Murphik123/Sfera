<!DOCTYPE html>
<html lang="tm">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>СФЕРА — TM Poçta</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="/css/style.css" />

    <style>
        .mail-page {
            padding: 120px 0 60px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .mail-container {
            display: flex;
            flex: 1;
            height: calc(100vh - 180px);
            min-height: 500px;
            border-radius: 24px;
            overflow: hidden;
            background: rgba(255,255,255,.04);
            border: 1px solid rgba(255,255,255,.08);
            backdrop-filter: blur(12px);
        }
        /* Левая панель (список папок) */
        .mail-sidebar {
            width: 240px;
            min-width: 200px;
            background: rgba(0,0,0,.2);
            border-right: 1px solid rgba(255,255,255,.08);
            display: flex;
            flex-direction: column;
            padding: 20px 16px;
            gap: 12px;
        }
        .mail-sidebar .compose-btn {
            padding: 14px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, #00d4ff, #008cff);
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: .3s;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,212,255,.25);
        }
        .mail-sidebar .compose-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 15px 40px rgba(0,212,255,.4);
        }
        .folder-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .folder-list li {
            padding: 12px 16px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: .2s;
            font-weight: 500;
            color: #bdd0df;
        }
        .folder-list li:hover {
            background: rgba(255,255,255,.05);
            color: white;
        }
        .folder-list li.active {
            background: rgba(0,212,255,.12);
            color: #00d4ff;
            font-weight: 600;
        }
        .folder-list li .badge {
            margin-left: auto;
            background: rgba(0,212,255,.2);
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 12px;
            color: #00d4ff;
        }
        .folder-list li .icon {
            font-size: 20px;
            width: 28px;
            text-align: center;
        }

        /* Правая панель (список писем) */
        .mail-list {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(0,0,0,.1);
            overflow: hidden;
        }
        .mail-list-header {
            padding: 16px 24px;
            border-bottom: 1px solid rgba(255,255,255,.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,.15);
            flex-wrap: wrap;
            gap: 10px;
        }
        .mail-list-header h2 {
            font-size: 20px;
            font-weight: 700;
        }
        .mail-list-header .actions {
            display: flex;
            gap: 10px;
        }
        .mail-list-header .actions button {
            background: transparent;
            border: none;
            color: #9fb5c8;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: .2s;
            font-size: 14px;
        }
        .mail-list-header .actions button:hover {
            background: rgba(255,255,255,.05);
            color: white;
        }
        .mail-items {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }
        .mail-item {
            display: flex;
            align-items: center;
            padding: 12px 24px;
            border-bottom: 1px solid rgba(255,255,255,.04);
            cursor: pointer;
            transition: .15s;
            gap: 16px;
        }
        .mail-item:hover {
            background: rgba(255,255,255,.04);
        }
        .mail-item.unread {
            background: rgba(0,212,255,.05);
            border-left: 3px solid #00d4ff;
        }
        .mail-item .checkbox {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,.2);
            border-radius: 4px;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: transparent;
            transition: .2s;
        }
        .mail-item .checkbox.checked {
            background: #00d4ff;
            border-color: #00d4ff;
            color: #08131d;
        }
        .mail-item .mail-from {
            font-weight: 600;
            min-width: 150px;
            color: white;
            font-size: 15px;
        }
        .mail-item .mail-subject {
            flex: 1;
            font-size: 15px;
            color: #dbe9ff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
        }
        .mail-item .mail-subject .snippet {
            color: #9fb5c8;
            font-weight: 400;
            margin-left: 8px;
        }
        .mail-item .mail-date {
            font-size: 13px;
            color: #9fb5c8;
            flex-shrink: 0;
        }
        .mail-item .star {
            font-size: 18px;
            cursor: pointer;
            color: #9fb5c8;
            transition: .2s;
            flex-shrink: 0;
        }
        .mail-item .star.active {
            color: #f5c542;
        }

        /* Просмотр письма */
        .mail-view {
            display: none;
            flex-direction: column;
            background: rgba(0,0,0,.1);
            padding: 24px;
            overflow-y: auto;
            flex: 1;
        }
        .mail-view.active {
            display: flex;
        }
        .mail-view .back-btn {
            background: transparent;
            border: none;
            color: #9fb5c8;
            font-size: 18px;
            cursor: pointer;
            align-self: flex-start;
            padding: 8px 0;
            transition: .2s;
        }
        .mail-view .back-btn:hover {
            color: white;
        }
        .mail-view .mail-header-view {
            margin: 12px 0 20px;
            border-bottom: 1px solid rgba(255,255,255,.08);
            padding-bottom: 16px;
        }
        .mail-view .mail-header-view .subject {
            font-size: 24px;
            font-weight: 700;
        }
        .mail-view .mail-header-view .meta {
            display: flex;
            justify-content: space-between;
            color: #9fb5c8;
            font-size: 14px;
            margin-top: 8px;
            flex-wrap: wrap;
            gap: 6px;
        }
        .mail-view .mail-body-view {
            font-size: 16px;
            line-height: 1.7;
            color: #dbe9ff;
            white-space: pre-wrap;
        }
        .mail-view .mail-body-view .placeholder {
            color: #9fb5c8;
            font-style: italic;
        }
        .mail-view .attachments {
            margin-top: 20px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .mail-view .attachments .file {
            background: rgba(255,255,255,.05);
            padding: 8px 14px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,.08);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #bdd0df;
        }

        /* Композиция письма (модальное окно) */
        .compose-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,.6);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .compose-modal.active {
            display: flex;
        }
        .compose-modal .compose-box {
            background: rgba(13,28,41,.98);
            border: 1px solid rgba(255,255,255,.12);
            border-radius: 24px;
            padding: 30px 35px;
            max-width: 600px;
            width: 95%;
            box-shadow: 0 30px 80px rgba(0,0,0,.6);
            max-height: 90vh;
            overflow-y: auto;
        }
        .compose-box h2 {
            margin-bottom: 20px;
            font-size: 26px;
        }
        .compose-box .form-group {
            margin-bottom: 16px;
        }
        .compose-box .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #dbe9ff;
            margin-bottom: 4px;
        }
        .compose-box .form-group input,
        .compose-box .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,.15);
            background: rgba(255,255,255,.05);
            color: white;
            font-size: 15px;
            transition: .3s;
            outline: none;
        }
        .compose-box .form-group input:focus,
        .compose-box .form-group textarea:focus {
            border-color: #00d4ff;
        }
        .compose-box .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }
        .compose-box .form-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 10px;
        }
        .compose-box .form-actions button {
            padding: 12px 28px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: .3s;
        }
        .compose-box .form-actions .btn-send {
            background: linear-gradient(135deg, #00d4ff, #008cff);
            color: white;
        }
        .compose-box .form-actions .btn-send:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(0,212,255,.3);
        }
        .compose-box .form-actions .btn-cancel {
            background: transparent;
            border: 1px solid rgba(255,255,255,.2);
            color: white;
        }
        .compose-box .form-actions .btn-cancel:hover {
            background: rgba(255,255,255,.05);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #9fb5c8;
        }
        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        @media (max-width: 992px) {
            .mail-sidebar { width: 180px; min-width: 150px; padding: 16px 12px; }
            .mail-item .mail-from { min-width: 100px; }
        }
        @media (max-width: 768px) {
            .mail-container { flex-direction: column; height: auto; }
            .mail-sidebar { width: 100%; min-width: unset; border-right: none; border-bottom: 1px solid rgba(255,255,255,.08); flex-direction: row; flex-wrap: wrap; gap: 8px; padding: 12px 16px; }
            .mail-sidebar .compose-btn { flex: 1; min-width: 120px; }
            .folder-list { flex-direction: row; flex-wrap: wrap; gap: 4px; }
            .folder-list li { padding: 8px 12px; }
            .mail-item { flex-wrap: wrap; padding: 12px 16px; gap: 8px; }
            .mail-item .mail-from { min-width: 80px; }
            .mail-item .mail-subject { width: 100%; order: 3; }
        }
    </style>
</head>
<body>
    <div id="particles"></div>

    <header>
        <div class="container">
            <a href="index.html" class="logo">
                <div class="logo-icon">
                    <svg class="logo-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">

                                <stop offset="0%" stop-color="#00ffa3" />

                                <stop offset="100%" stop-color="#1f6bff" />
                            </linearGradient>
                            <filter id="logoGlow" x="-30%" y="-30%" width="160%" height="160%">
                                <feGaussianBlur stdDeviation="4" result="blur" />

                            </filter>
                        </defs>
                        <circle cx="50" cy="50" r="28" fill="url(#logoGrad)" opacity="0.15" filter="url(#logoGlow)" />
                        <g filter="url(#logoGlow)">
                            <circle cx="50" cy="50" r="40" stroke="url(#logoGrad)" stroke-width="2.5" stroke-dasharray="1 5" stroke-linecap="round" opacity="0.4" />
                            <path d="M50 12 C72 12, 88 28, 88 50 C88 72, 68 88, 46 86 C26 84, 14 66, 16 46 C18 28, 34 16, 52 18 C68 20, 78 34, 76 50 C74 64, 62 74, 48 72 C36 70, 28 58, 30 46 C32 36, 42 28, 52 30 C60 32, 66 40, 64 50 C62 58, 54 62, 46 60" stroke="url(#logoGrad)" stroke-width="3" stroke-linecap="round" stroke-dasharray="1 6" />
                            <circle cx="48" cy="48" r="3.5" fill="#ffffff" filter="url(#logoGlow)" />
                        </g>
                    </svg>
                </div>
                <div class="logo-text">
                    <h2>SFERA</h2>
                    <p>Milli Sanly Platforma</p>
                </div>
            </a>

            <div class="header-right" style="display:flex; align-items:center; gap:12px;">
                <span class="user-info" id="userDisplay">👤 <strong id="username">User</strong></span>
                <a href="dashboard.html" class="btn btn-outline" style="padding:8px 16px; font-size:13px; background:transparent; border:1px solid rgba(255,255,255,.15); color:white; border-radius:12px; text-decoration:none;">← Dashboard</a>
                <button class="lang" id="langBtn">TM</button>
                <button class="logout-btn" id="logoutBtn" style="background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.15); color:white; padding:8px 16px; border-radius:12px; cursor:pointer;">Çykmak</button>
            </div>
        </div>
    </header>

    <section class="mail-page">
        <div class="container" style="flex:1; display:flex; flex-direction:column;">
            <div class="mail-container">
                <!-- Левая панель: папки и кнопка "Написать" -->
                <div class="mail-sidebar">
                    <button class="compose-btn" id="composeBtn">✏️ Täze hat</button>
                    <ul class="folder-list" id="folderList">
                        <li class="active" data-folder="inbox"><span class="icon">📥</span> Gelen <span class="badge" id="inboxCount">0</span></li>
                        <li data-folder="sent"><span class="icon">📤</span> Iberilen</li>
                        <li data-folder="drafts"><span class="icon">📝</span> Garamalar</li>
                        <li data-folder="trash"><span class="icon">🗑️</span> Pozulan</li>
                    </ul>
                </div>

                <!-- Правая панель: список писем -->
                <div class="mail-list" id="mailList">
                    <div class="mail-list-header">
                        <h2 id="folderTitle">Gelen</h2>
                        <div class="actions">
                            <button id="refreshBtn">⟳ Täzele</button>
                            <button id="selectAllBtn">☑︎</button>
                        </div>
                    </div>
                    <div class="mail-items" id="mailItems">
                        <!-- Письма будут загружены динамически -->
                    </div>
                </div>

                <!-- Просмотр письма (скрыт) -->
                <div class="mail-view" id="mailView">
                    <button class="back-btn" id="backToList">←</button>
                    <div class="mail-header-view">
                        <div class="subject" id="viewSubject">Тема</div>
                        <div class="meta">
                            <span id="viewFrom">От: User</span>
                            <span id="viewDate">Дата</span>
                        </div>
                    </div>
                    <div class="mail-body-view" id="viewBody">Текст письма</div>
                    <div class="attachments" id="viewAttachments"></div>
                </div>
            </div>
        </div>
    </section>

    <!-- Модальное окно для написания письма -->
    <div class="compose-modal" id="composeModal">
        <div class="compose-box">
            <h2>Täze hat</h2>
            <form id="composeForm">
                <div class="form-group">
                    <label for="composeTo">Kime</label>
                    <input type="text" id="composeTo" placeholder="alýan@example.com" required />
                </div>
                <div class="form-group">
                    <label for="composeSubject">Tema</label>
                    <input type="text" id="composeSubject" placeholder="Hatyň temasy" required />
                </div>
                <div class="form-group">
                    <label for="composeBody">Hatyň teksti</label>
                    <textarea id="composeBody" placeholder="Bu ýere hatyňyzy ýazyň..." rows="6"></textarea>
                </div>
                <div class="form-group">
                    <label>Faýl goşmak (islege görä)</label>
                    <input type="file" id="composeFile" multiple style="color:#bdd0df;" />
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-cancel" id="cancelComposeBtn">Ýatyr</button>
                    <button type="submit" class="btn-send">Iber</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ============================================================
        // НАСТРОЙКА API
        // ============================================================
        const API_BASE_URL = 'https://sfera-1.onrender.com';
        const token = localStorage.getItem('token');

        if (!token) {
            window.location.href = 'login.html';
        }

        // ============================================================
        // ПЕРЕВОДЫ
        // ============================================================
        const translations = {
            tm: {
                logout: "Çykmak",
                compose: "Täze hat",
                inbox: "Gelen",
                sent: "Iberilen",
                drafts: "Garamalar",
                trash: "Pozulan",
                refresh: "Täzele",
                select_all: "Hemmesini saýla",
                from: "Kimden",
                date: "Senesi",
                subject: "Tema",
                no_mails: "Hiç hili hat ýok",
                send_success: "Hat iberildi!",
                send_error: "Hat iberilmedi. Täzeden synanyşyň.",
                view_back: "← Yza",
                compose_title: "Täze hat",
                to: "Kime",
                body: "Hatyň teksti",
                cancel: "Ýatyr",
                send: "Iber"
            },
            ru: {
                logout: "Выйти",
                compose: "Новое письмо",
                inbox: "Входящие",
                sent: "Отправленные",
                drafts: "Черновики",
                trash: "Корзина",
                refresh: "Обновить",
                select_all: "Выбрать все",
                from: "От",
                date: "Дата",
                subject: "Тема",
                no_mails: "Нет писем",
                send_success: "Письмо отправлено!",
                send_error: "Ошибка отправки. Попробуйте снова.",
                view_back: "← Назад",
                compose_title: "Новое письмо",
                to: "Кому",
                body: "Текст письма",
                cancel: "Отмена",
                send: "Отправить"
            },
            en: {
                logout: "Logout",
                compose: "New message",
                inbox: "Inbox",
                sent: "Sent",
                drafts: "Drafts",
                trash: "Trash",
                refresh: "Refresh",
                select_all: "Select all",
                from: "From",
                date: "Date",
                subject: "Subject",
                no_mails: "No messages",
                send_success: "Message sent!",
                send_error: "Failed to send. Try again.",
                view_back: "← Back",
                compose_title: "New message",
                to: "To",
                body: "Message body",
                cancel: "Cancel",
                send: "Send"
            }
        };

        let currentLang = localStorage.getItem('lang') || 'tm';
        let currentFolder = 'inbox';
        let mails = [];
        let selectedMails = new Set();
        let viewingMailId = null;

        function setLanguage(lang) {
            if (!translations[lang]) return;
            currentLang = lang;
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang][key]) {
                    el.textContent = translations[lang][key];
                }
            });
            document.getElementById('langBtn').textContent = lang.toUpperCase();
            document.getElementById('logoutBtn').textContent = translations[lang].logout;
            document.getElementById('composeBtn').innerHTML = `✏️ ${translations[lang].compose}`;
            localStorage.setItem('lang', lang);
            // Обновить интерфейс
            updateFolderTitles();
            renderMails();
        }

        function updateFolderTitles() {
            const folderNames = {
                inbox: translations[currentLang].inbox,
                sent: translations[currentLang].sent,
                drafts: translations[currentLang].drafts,
                trash: translations[currentLang].trash
            };
            document.querySelectorAll('.folder-list li').forEach(li => {
                const key = li.dataset.folder;
                const icon = li.querySelector('.icon').textContent;
                const badge = li.querySelector('.badge');
                const textNode = li.childNodes[2]; // текст после иконки
                // Упрощённо: обновляем только название (без иконки и бейджа)
                // Но мы сделаем через data-i18n отдельно
            });
            // Обновляем заголовок папки
            document.getElementById('folderTitle').textContent = folderNames[currentFolder] || translations[currentLang].inbox;
        }

        document.querySelectorAll('[data-i18n]').forEach(el => {
            // Инициализация переводов будет сделана ниже
        });

        document.getElementById('langBtn').addEventListener('click', function() {
            const cycle = ['tm', 'ru', 'en'];
            let idx = cycle.indexOf(currentLang);
            idx = (idx + 1) % cycle.length;
            setLanguage(cycle[idx]);
        });

        // ============================================================
        // ЗАГРУЗКА ПОЛЬЗОВАТЕЛЯ
        // ============================================================
        const userData = JSON.parse(localStorage.getItem('user') || '{"username":"Guest"}');
        document.getElementById('username').textContent = userData.username || 'User';

        document.getElementById('logoutBtn').addEventListener('click', function() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        });

        // ============================================================
        // ФУНКЦИИ РАБОТЫ С ДАННЫМИ (имитация)
        // ============================================================
        function generateMockMails() {
            const now = Date.now();
            const fromUsers = ['Aýdar', 'Meret', 'Gülşat', 'Saparmyrat', 'Oguljeren'];
            const subjects = ['Gepleşeliň', 'Täze mümkinçilikler', 'Duşuşyk', 'Kömek gerek', 'Söwda barada'];
            const bodies = [
                'Salam, ýagdaýlar nähili? Men size teklip bermek isleýärin.',
                'Biz täze taslamany başladýarys, sizi hem goşulmaga çagyrýarys.',
                'Ertir sagat 10-da duşuşalykmy?',
                'Maňa bu mesele boýunça maslahat gerek, kömek edip bilersiňizmi?',
                'Siziň üçin täze harytlar geldi, gyzyklanýan bolsaňyz habarlaşyň.'
            ];
            const mails = [];
            for (let i = 0; i < 20; i++) {
                const from = fromUsers[i % fromUsers.length];
                const subject = subjects[i % subjects.length];
                const body = bodies[i % bodies.length] + (i % 3 === 0 ? ' Goşmaça maglumat: ...' : '');
                const isUnread = i < 8;
                const date = new Date(now - i * 3600000 - Math.random() * 60000);
                mails.push({
                    id: `mail-${i}`,
                    from,
                    to: userData.username || 'User',
                    subject,
                    body,
                    date: date.toISOString(),
                    unread: isUnread,
                    folder: i < 15 ? 'inbox' : (i < 18 ? 'sent' : 'drafts'),
                    starred: i % 5 === 0,
                    attachments: i % 4 === 0 ? ['файл1.pdf', 'файл2.jpg'] : []
                });
            }
            return mails;
        }

        // Инициализация данных
        mails = generateMockMails();

        function getMailsForFolder(folder) {
            return mails.filter(m => m.folder === folder);
        }

        function renderMails() {
            const container = document.getElementById('mailItems');
            const folderMails = getMailsForFolder(currentFolder);
            const folderNames = {
                inbox: translations[currentLang].inbox,
                sent: translations[currentLang].sent,
                drafts: translations[currentLang].drafts,
                trash: translations[currentLang].trash
            };
            document.getElementById('folderTitle').textContent = folderNames[currentFolder] || translations[currentLang].inbox;

            // Обновляем счётчик входящих
            const inboxCount = getMailsForFolder('inbox').filter(m => m.unread).length;
            document.getElementById('inboxCount').textContent = inboxCount;

            if (!folderMails.length) {
                container.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>${translations[currentLang].no_mails}</p></div>`;
                return;
            }

            // Сортируем по дате (новые сверху)
            folderMails.sort((a, b) => new Date(b.date) - new Date(a.date));

            container.innerHTML = folderMails.map(m => {
                const isSelected = selectedMails.has(m.id);
                const unreadClass = m.unread ? 'unread' : '';
                const starClass = m.starred ? 'active' : '';
                const dateStr = new Date(m.date).toLocaleString('ru-RU', {day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit'});
                return `
                    <div class="mail-item ${unreadClass}" data-id="${m.id}">
                        <div class="checkbox ${isSelected ? 'checked' : ''}" data-id="${m.id}">${isSelected ? '✓' : ''}</div>
                        <div class="mail-from">${m.from}</div>
                        <div class="mail-subject">
                            ${m.subject}
                            <span class="snippet">${m.body.substring(0, 40)}...</span>
                        </div>
                        <div class="star ${starClass}" data-id="${m.id}">${m.starred ? '★' : '☆'}</div>
                        <div class="mail-date">${dateStr}</div>
                    </div>
                `;
            }).join('');

            // Обработчики для писем (клик для открытия)
            container.querySelectorAll('.mail-item').forEach(el => {
                el.addEventListener('click', function(e) {
                    // Если клик по чекбоксу или звёздочке – не открываем письмо
                    if (e.target.closest('.checkbox') || e.target.closest('.star')) return;
                    const id = this.dataset.id;
                    openMailView(id);
                });
            });

            // Чекбоксы
            container.querySelectorAll('.checkbox').forEach(el => {
                el.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const id = this.dataset.id;
                    if (selectedMails.has(id)) {
                        selectedMails.delete(id);
                        this.classList.remove('checked');
                        this.textContent = '';
                    } else {
                        selectedMails.add(id);
                        this.classList.add('checked');
                        this.textContent = '✓';
                    }
                });
            });

            // Звёздочки
            container.querySelectorAll('.star').forEach(el => {
                el.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const id = this.dataset.id;
                    const mail = mails.find(m => m.id === id);
                    if (mail) {
                        mail.starred = !mail.starred;
                        renderMails(); // перерисовать
                    }
                });
            });
        }

        // ============================================================
        // ПРОСМОТР ПИСЬМА
        // ============================================================
        function openMailView(id) {
            const mail = mails.find(m => m.id === id);
            if (!mail) return;
            viewingMailId = id;
            // Пометить как прочитанное
            mail.unread = false;

            document.getElementById('mailList').style.display = 'none';
            document.getElementById('mailView').classList.add('active');

            document.getElementById('viewSubject').textContent = mail.subject;
            document.getElementById('viewFrom').textContent = `${translations[currentLang].from}: ${mail.from}`;
            document.getElementById('viewDate').textContent = `${translations[currentLang].date}: ${new Date(mail.date).toLocaleString('ru-RU')}`;
            document.getElementById('viewBody').textContent = mail.body || '(Пусто)';

            const attachContainer = document.getElementById('viewAttachments');
            if (mail.attachments && mail.attachments.length) {
                attachContainer.innerHTML = mail.attachments.map(f => `<div class="file">📎 ${f}</div>`).join('');
            } else {
                attachContainer.innerHTML = '';
            }
            // Обновить список
            renderMails();
        }

        document.getElementById('backToList').addEventListener('click', function() {
            document.getElementById('mailView').classList.remove('active');
            document.getElementById('mailList').style.display = 'flex';
            renderMails();
        });

        // ============================================================
        // ПЕРЕКЛЮЧЕНИЕ ПАПОК
        // ============================================================
        document.querySelectorAll('.folder-list li').forEach(li => {
            li.addEventListener('click', function() {
                document.querySelectorAll('.folder-list li').forEach(el => el.classList.remove('active'));
                this.classList.add('active');
                currentFolder = this.dataset.folder;
                selectedMails.clear();
                // Скрыть просмотр
                document.getElementById('mailView').classList.remove('active');
                document.getElementById('mailList').style.display = 'flex';
                renderMails();
            });
        });

        // ============================================================
        // КОМПОЗИЦИЯ ПИСЬМА
        // ============================================================
        document.getElementById('composeBtn').addEventListener('click', function() {
            document.getElementById('composeModal').classList.add('active');
            document.getElementById('composeForm').reset();
        });

        document.getElementById('cancelComposeBtn').addEventListener('click', function() {
            document.getElementById('composeModal').classList.remove('active');
        });

        document.getElementById('composeModal').addEventListener('click', function(e) {
            if (e.target === this) this.classList.remove('active');
        });

        document.getElementById('composeForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const to = document.getElementById('composeTo').value.trim();
            const subject = document.getElementById('composeSubject').value.trim();
            const body = document.getElementById('composeBody').value.trim();
            const fileInput = document.getElementById('composeFile');
            const files = fileInput.files ? Array.from(fileInput.files).map(f => f.name) : [];

            if (!to || !subject || !body) {
                alert('Doldurmaly ýerler boş galdy!');
                return;
            }

            // Создаём новое письмо в папке "Отправленные"
            const newMail = {
                id: `mail-${Date.now()}`,
                from: userData.username || 'User',
                to: to,
                subject: subject,
                body: body,
                date: new Date().toISOString(),
                unread: false,
                folder: 'sent',
                starred: false,
                attachments: files
            };
            mails.push(newMail);
            // Также дублируем во входящие получателя (для демонстрации)
            // Здесь можно было бы отправить на сервер, но для демо просто добавим копию во входящие
            const receivedMail = {
                ...newMail,
                id: `mail-${Date.now() + 1}`,
                from: userData.username || 'User',
                to: to,
                folder: 'inbox',
                unread: true
            };
            mails.push(receivedMail);

            document.getElementById('composeModal').classList.remove('active');
            renderMails();
            alert(translations[currentLang].send_success);
        });

        // ============================================================
        // ОБНОВЛЕНИЕ
        // ============================================================
        document.getElementById('refreshBtn').addEventListener('click', function() {
            renderMails();
            // В реальности здесь был бы запрос к серверу
        });

        // ============================================================
        // ВЫБОР ВСЕХ
        // ============================================================
        document.getElementById('selectAllBtn').addEventListener('click', function() {
            const folderMails = getMailsForFolder(currentFolder);
            const allIds = folderMails.map(m => m.id);
            const allSelected = allIds.every(id => selectedMails.has(id));
            if (allSelected) {
                allIds.forEach(id => selectedMails.delete(id));
            } else {
                allIds.forEach(id => selectedMails.add(id));
            }
            renderMails();
        });

        // ============================================================
        // ЧАСТИЦЫ
        // ============================================================
        const particles = document.getElementById('particles');
        if (particles && particles.children.length === 0) {
            for (let i = 0; i < 60; i++) {
                const p = document.createElement('span');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.top = Math.random() * 100 + '%';
                p.style.animationDuration = (6 + Math.random() * 12) + 's';
                p.style.animationDelay = Math.random() * 5 + 's';
                particles.appendChild(p);
            }
        }

        // ============================================================
        // ИНИЦИАЛИЗАЦИЯ
        // ============================================================
        setLanguage(currentLang);
        renderMails();
        console.log('Mail page loaded');
    </script>
</body>
</html>
