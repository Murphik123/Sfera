<!DOCTYPE html>
<html lang="tm">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>СФЕРА — Messenger</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="/css/style.css" />

    <style>
        /* ============================================================
           МЕССЕНДЖЕР (обновлённый)
           ============================================================ */
        .messenger-page {
            padding: 120px 0 60px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .messenger-container {
            display: flex;
            flex: 1;
            height: calc(100vh - 180px);
            min-height: 500px;
            border-radius: 24px;
            overflow: hidden;
            background: rgba(255,255,255,.04);
            border: 1px solid rgba(255,255,255,.08);
            backdrop-filter: blur(12px);
        }
        /* Левая панель (список диалогов / новости) */
        .messenger-sidebar {
            width: 320px;
            min-width: 280px;
            background: rgba(0,0,0,.2);
            border-right: 1px solid rgba(255,255,255,.08);
            display: flex;
            flex-direction: column;
        }
        .sidebar-header {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255,255,255,.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .sidebar-header h2 {
            font-size: 18px;
            font-weight: 700;
        }
        .sidebar-header .tabs {
            display: flex;
            gap: 8px;
        }
        .sidebar-header .tabs button {
            background: transparent;
            border: none;
            color: #9fb5c8;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: .3s;
        }
        .sidebar-header .tabs button.active {
            background: rgba(0,212,255,.15);
            color: #00d4ff;
        }
        .sidebar-header .tabs button:hover {
            background: rgba(255,255,255,.05);
        }
        .sidebar-search {
            padding: 12px 20px;
        }
        .sidebar-search input {
            width: 100%;
            padding: 10px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,.1);
            background: rgba(255,255,255,.05);
            color: white;
            font-size: 14px;
            outline: none;
            transition: .3s;
        }
        .sidebar-search input:focus {
            border-color: #00d4ff;
        }
        .sidebar-search input::placeholder {
            color: #9fb5c8;
        }
        .dialogs-list,
        .news-feed {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }
        .dialog-item {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            cursor: pointer;
            transition: .2s;
            border-left: 3px solid transparent;
            gap: 12px;
        }
        .dialog-item:hover {
            background: rgba(255,255,255,.05);
        }
        .dialog-item.active {
            background: rgba(0,212,255,.08);
            border-left-color: #00d4ff;
        }
        .dialog-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(0,212,255,.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 600;
            color: #00d4ff;
            flex-shrink: 0;
        }
        .dialog-info {
            flex: 1;
            min-width: 0;
        }
        .dialog-info .name {
            font-weight: 600;
            font-size: 15px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .dialog-info .last-msg {
            font-size: 13px;
            color: #9fb5c8;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .dialog-time {
            font-size: 11px;
            color: #6b7f94;
            flex-shrink: 0;
        }
        .unread-badge {
            background: #00d4ff;
            color: #08131d;
            font-size: 11px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 20px;
            min-width: 20px;
            text-align: center;
        }
        /* Новости */
        .news-item {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255,255,255,.06);
            cursor: pointer;
            transition: .15s;
        }
        .news-item:hover {
            background: rgba(255,255,255,.03);
        }
        .news-item .title {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 4px;
        }
        .news-item .summary {
            font-size: 14px;
            color: #bdd0df;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .news-item .meta {
            font-size: 12px;
            color: #9fb5c8;
            margin-top: 6px;
            display: flex;
            gap: 12px;
        }
        .news-item .image-placeholder {
            margin-top: 8px;
            background: rgba(255,255,255,.05);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            font-size: 40px;
            color: #9fb5c8;
        }

        /* Правая панель (чат) */
        .messenger-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(0,0,0,.1);
        }
        .chat-header {
            padding: 16px 24px;
            border-bottom: 1px solid rgba(255,255,255,.08);
            display: flex;
            align-items: center;
            gap: 14px;
            background: rgba(0,0,0,.15);
            min-height: 70px;
        }
        .chat-header .back-btn {
            display: none;
            background: transparent;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }
        .chat-header .chat-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(0,212,255,.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 600;
            color: #00d4ff;
        }
        .chat-header .chat-name {
            font-weight: 700;
            font-size: 18px;
        }
        .chat-header .chat-status {
            font-size: 13px;
            color: #9fb5c8;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 75%;
            padding: 12px 18px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.5;
            word-wrap: break-word;
            position: relative;
        }
        .message.sent {
            align-self: flex-end;
            background: linear-gradient(135deg, #00d4ff, #008cff);
            color: white;
            border-bottom-right-radius: 6px;
        }
        .message.received {
            align-self: flex-start;
            background: rgba(255,255,255,.08);
            color: white;
            border-bottom-left-radius: 6px;
        }
        .message .msg-time {
            font-size: 11px;
            color: rgba(255,255,255,.5);
            margin-top: 4px;
            text-align: right;
        }
        .message.received .msg-time {
            color: #9fb5c8;
        }
        .message .msg-username {
            font-size: 12px;
            font-weight: 600;
            color: #00d4ff;
            margin-bottom: 4px;
        }
        .chat-input-area {
            padding: 16px 24px;
            border-top: 1px solid rgba(255,255,255,.08);
            display: flex;
            gap: 10px;
            background: rgba(0,0,0,.1);
            align-items: center;
            flex-wrap: wrap;
        }
        .chat-input-area input {
            flex: 1;
            padding: 12px 18px;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,.1);
            background: rgba(255,255,255,.05);
            color: white;
            font-size: 15px;
            outline: none;
            transition: .3s;
            min-width: 120px;
        }
        .chat-input-area input:focus {
            border-color: #00d4ff;
        }
        .chat-input-area input::placeholder {
            color: #9fb5c8;
        }
        .chat-input-area .call-buttons {
            display: flex;
            gap: 6px;
        }
        .chat-input-area .call-buttons button {
            background: transparent;
            border: 1px solid rgba(255,255,255,.2);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 18px;
            cursor: pointer;
            transition: .2s;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .chat-input-area .call-buttons button:hover {
            background: rgba(255,255,255,.1);
            border-color: #00d4ff;
        }
        .chat-input-area .send-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 24px;
            background: linear-gradient(135deg, #00d4ff, #008cff);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: .3s;
        }
        .chat-input-area .send-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(0,212,255,.3);
        }
        .chat-input-area .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .empty-chat {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: #9fb5c8;
            text-align: center;
            padding: 40px;
        }
        .empty-chat .icon {
            font-size: 60px;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        .empty-chat h3 {
            font-size: 22px;
            color: white;
            margin-bottom: 8px;
        }

        .empty-state {
            text-align: center;
            padding: 30px 20px;
            color: #9fb5c8;
        }
        .empty-state .icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        @media (max-width: 992px) {
            .messenger-sidebar { width: 260px; min-width: 220px; }
        }
        @media (max-width: 768px) {
            .messenger-container { flex-direction: column; height: auto; min-height: 600px; }
            .messenger-sidebar {
                width: 100%;
                min-width: unset;
                border-right: none;
                border-bottom: 1px solid rgba(255,255,255,.08);
                max-height: 300px;
            }
            .chat-header .back-btn { display: block; }
            .message { max-width: 90%; }
            .chat-input-area { flex-wrap: wrap; justify-content: center; }
            .chat-input-area input { min-width: 100%; }
        }
    </style>
</head>
<body>

    <header>

        // ============================================================
        // НАСТРОЙКА API и переводы
        // ============================================================
        const API_BASE_URL = 'https://sfera-1.onrender.com';
        const token = localStorage.getItem('token');

        if (!token) {

        const translations = {

            en: {

                search_placeholder: "Search...",
                loading: "Loading...",

                send: "Send",

                assistant_status: "online",
                assistant_hello: "Hi! I'm the Sfera platform assistant. How can I help you?",
                audio_call: "Audio call",

                news_summary_1: "New version of Sfera platform released. New features.",

                news_title_3: "New banking services",
                news_summary_3: "New credit and deposit options added to TM Bank.",
                news_title_4: "Video calls in messenger",
                news_summary_4: "Now you can make video calls in the messenger. New feature."

        };

        let currentLang = localStorage.getItem('lang') || 'tm';
        let currentTab = 'chats';
        let currentDialogId = null;
        let dialogs = [];
        let messages = [];
        const userData = JSON.parse(localStorage.getItem('user') || '{"username":"Guest"}');
        document.getElementById('username').textContent = userData.username || 'User';

        function setLanguage(lang) {
            if (!translations[lang]) return;
            currentLang = lang;
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang][key]) {
                    if (el.tagName === 'INPUT' && el.getAttribute('placeholder')) {
                        el.placeholder = translations[lang][key];
                    } else {
                        el.textContent = translations[lang][key];
                    }
                }
            });
            document.getElementById('langBtn').textContent = lang.toUpperCase();
            document.getElementById('logoutBtn').textContent = translations[lang].logout;
            localStorage.setItem('lang', lang);
            updateUI();
        }

        function updateUI() {
            // Обновить текст вкладок
            document.querySelectorAll('.sidebar-header .tabs button').forEach(btn => {
                const key = btn.dataset.i18n;
                if (translations[currentLang][key]) btn.textContent = translations[currentLang][key];
            });
            // Обновить приветствие помощника
            const firstMsg = document.querySelector('.chat-messages .msg.bot');
            if (firstMsg && firstMsg.textContent.includes('Salam') || firstMsg.textContent.includes('Привет') || firstMsg.textContent.includes('Hi')) {
                firstMsg.textContent = translations[currentLang].assistant_hello;
            }
            // Переключить вкладки
            switchTab(currentTab);
        }

        document.getElementById('langBtn').addEventListener('click', function() {
            const cycle = ['tm', 'ru', 'en'];
            let idx = cycle.indexOf(currentLang);
            idx = (idx + 1) % cycle.length;
            setLanguage(cycle[idx]);
        });

        document.getElementById('logoutBtn').addEventListener('click', function() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        });

        // ============================================================
        // ВКЛАДКИ
        // ============================================================
        function switchTab(tab) {
            currentTab = tab;
            const dialogsList = document.getElementById('dialogsList');
            const newsFeed = document.getElementById('newsFeed');
            const searchInput = document.getElementById('searchInput');
            if (tab === 'chats') {
                dialogsList.style.display = 'block';
                newsFeed.style.display = 'none';
                searchInput.placeholder = translations[currentLang].search_placeholder;
                loadDialogs();
            } else if (tab === 'news') {
                dialogsList.style.display = 'none';
                newsFeed.style.display = 'block';
                searchInput.placeholder = 'Habarlar gözleg...';
                renderNews();
            } else if (tab === 'assistant') {
                dialogsList.style.display = 'block';
                newsFeed.style.display = 'none';
                searchInput.placeholder = translations[currentLang].search_placeholder;
                // Открыть чат с помощником
                const assistantId = 'assistant';
                const assistantName = translations[currentLang].assistant_name;
                let existing = dialogs.find(d => d.id === assistantId);
                if (!existing) {
                    dialogs.unshift({
                        id: assistantId,
                        name: assistantName,
                        lastMessage: translations[currentLang].assistant_hello,
                        time: new Date(),
                        unread: 1
                    });
                }
                renderDialogs(dialogs);
                openChat(assistantId, assistantName, 'assistant');
            }
            // Обновить активную вкладку
            document.querySelectorAll('.sidebar-header .tabs button').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.tab === tab);
            });
        }

        document.querySelectorAll('.sidebar-header .tabs button').forEach(btn => {
            btn.addEventListener('click', function() {
                switchTab(this.dataset.tab);
            });
        });

        // ============================================================
        // ЗАГРУЗКА ДИАЛОГОВ (имитация)
        // ============================================================
        function loadDialogs() {
            const listEl = document.getElementById('dialogsList');
            const loadingEl = document.getElementById('loadingDialogs');
            if (dialogs.length > 0) {
                renderDialogs(dialogs);
                return;
            }
            // Создаём демо-диалоги
            const fakeDialogs = [
                { id: '1', name: 'Aýdar', lastMessage: 'Salam!', time: new Date(), unread: 2 },
                { id: '2', name: 'Meret', lastMessage: 'Nähili?', time: new Date(Date.now() - 3600000), unread: 0 },
                { id: '3', name: 'Gülşat', lastMessage: 'Gepleşeliň!', time: new Date(Date.now() - 7200000), unread: 5 },
                { id: '4', name: 'Saparmyrat', lastMessage: 'Habar bar', time: new Date(Date.now() - 86400000), unread: 0 }
            ];
            dialogs = fakeDialogs;
            renderDialogs(dialogs);
        }

        function renderDialogs(dialogs) {
            const listEl = document.getElementById('dialogsList');
            if (!dialogs || dialogs.length === 0) {
                listEl.innerHTML = `<div class="empty-state" style="padding:30px 20px; text-align:center; color:#9fb5c8;">📭 Hiç hili söhbet ýok</div>`;
                return;
            }
            listEl.innerHTML = dialogs.map(d => `
                <div class="dialog-item ${currentDialogId === d.id ? 'active' : ''}" data-id="${d.id}" data-name="${d.name}">
                    <div class="dialog-avatar">${d.name.charAt(0).toUpperCase()}</div>
                    <div class="dialog-info">
                        <div class="name">${d.name}</div>
                        <div class="last-msg">${d.lastMessage || ''}</div>
                    </div>
                    <div style="display:flex; flex-direction:column; align-items:flex-end; gap:4px;">
                        <span class="dialog-time">${d.time ? new Date(d.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : ''}</span>
                        ${d.unread > 0 ? `<span class="unread-badge">${d.unread}</span>` : ''}
                    </div>
                </div>
            `).join('');

            listEl.querySelectorAll('.dialog-item').forEach(el => {
                el.addEventListener('click', function() {
                    const id = this.dataset.id;
                    const name = this.dataset.name;
                    openChat(id, name, 'chats');
                });
            });
        }

        // ============================================================
        // ОТКРЫТИЕ ЧАТА
        // ============================================================
        function openChat(id, name, type = 'chats') {
            currentDialogId = id;
            document.querySelectorAll('.dialog-item').forEach(el => el.classList.remove('active'));
            const dialogEl = document.querySelector(`.dialog-item[data-id="${id}"]`);
            if (dialogEl) dialogEl.classList.add('active');

            document.getElementById('chatName').textContent = name;
            document.getElementById('chatAvatar').textContent = name.charAt(0).toUpperCase();
            document.getElementById('chatStatus').textContent = translations[currentLang].online;

            loadMessages(id);
        }

        // ============================================================
        // ЗАГРУЗКА СООБЩЕНИЙ
        // ============================================================
        function loadMessages(dialogId) {
            const container = document.getElementById('chatMessages');
            // Имитация сообщений
            const fakeMessages = [
                { from: 'user', text: 'Salam!', time: new Date(Date.now() - 60000) },
                { from: dialogId === '1' ? 'Aýdar' : 'other', text: 'Salam, nähili?', time: new Date(Date.now() - 30000) },
                { from: 'user', text: 'Gowy, sen?', time: new Date(Date.now() - 10000) },
            ];
            if (dialogId === 'assistant') {
                fakeMessages.push({ from: 'assistant', text: translations[currentLang].assistant_hello, time: new Date() });
            }
            messages = fakeMessages;
            renderMessages(messages);
        }

        function renderMessages(messages) {
            const container = document.getElementById('chatMessages');
            if (!messages || messages.length === 0) {
                container.innerHTML = `<div class="empty-chat"><div class="icon">💬</div><h3>Hiç hili habar ýok</h3></div>`;
                return;
            }
            container.innerHTML = messages.map(msg => {
                const isSent = msg.from === 'user';
                const senderName = isSent ? '' : `<div class="msg-username">${msg.from}</div>`;
                return `
                    <div class="message ${isSent ? 'sent' : 'received'}">
                        ${senderName}
                        ${msg.text}
                        <div class="msg-time">${new Date(msg.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                    </div>
                `;
            }).join('');
            container.scrollTop = container.scrollHeight;
        }

        // ============================================================
        // ОТПРАВКА СООБЩЕНИЯ
        // ============================================================
        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        document.getElementById('messageInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !currentDialogId) return;

            const msg = { from: 'user', text, time: new Date() };
            messages.push(msg);
            renderMessages(messages);
            input.value = '';

            // Имитация ответа
            setTimeout(() => {
                const reply = {
                    from: currentDialogId === 'assistant' ? 'Kömekçi' : 'Aýdar',
                    text: currentDialogId === 'assistant' ? translations[currentLang].assistant_hello : 'Gowy, men size kömek ederin.',
                    time: new Date()
                };
                messages.push(reply);
                renderMessages(messages);
            }, 800);
        }

        // ============================================================
        // АУДИО / ВИДЕО ВЫЗОВЫ (заглушки)
        // ============================================================
        document.getElementById('audioCallBtn').addEventListener('click', function() {
            alert('📞 ' + translations[currentLang].audio_call + ' (simulýasiýa)');
        });
        document.getElementById('videoCallBtn').addEventListener('click', function() {
            alert('📹 ' + translations[currentLang].video_call + ' (simulýasiýa)');
        });

        // ============================================================
        // ЛЕНТА НОВОСТЕЙ
        // ============================================================
        function renderNews() {
            const feed = document.getElementById('newsFeed');
            const newsItems = [
                { title: translations[currentLang].news_title_1, summary: translations[currentLang].news_summary_1, image: '📢' },
                { title: translations[currentLang].news_title_2, summary: translations[currentLang].news_summary_2, image: '📈' },
                { title: translations[currentLang].news_title_3, summary: translations[currentLang].news_summary_3, image: '🏦' },
                { title: translations[currentLang].news_title_4, summary: translations[currentLang].news_summary_4, image: '📹' }
            ];
            feed.innerHTML = newsItems.map(item => `
                <div class="news-item">
                    <div class="title">${item.title}</div>
                    <div class="summary">${item.summary}</div>
                    <div class="image-placeholder">${item.image}</div>
                    <div class="meta"><span>⏱ ${new Date().toLocaleDateString()}</span><span>❤️ 12</span></div>
                </div>
            `).join('');
        }

        // ============================================================
        // КНОПКА НАЗАД (уже есть через data-i18n)
        // ============================================================

        // ============================================================
        // ЧАСТИЦЫ
        // ============================================================
        const particles = document.getElementById('particles');
        if (particles && particles.children.length === 0) {
            for (let i = 0; i < 60; i++) {
                const p = document.createElement('span');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.top = Math.random() * 100 + '%';
                p.style.animationDuration = (6 + Math.random() * 12) + 's';
                p.style.animationDelay = Math.random() * 5 + 's';
                particles.appendChild(p);
            }
        }

        // ============================================================
        // ИНИЦИАЛИЗАЦИЯ
        // ============================================================
        setLanguage(currentLang);
        switchTab('chats');
        console.log('Messenger with news and calls loaded');
    </script>
</body>
</html>
