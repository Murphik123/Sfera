<!DOCTYPE html>
<html lang="tm">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>СФЕРА — Giriş</title>
    <!-- ... все стили как раньше ... -->
</head>
<body>
    <!-- ... форма входа ... -->
    <script>
        // ============================================================
        // ЛОГИКА ВХОДА (исправленная)
        // ============================================================
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const user = users.find(u => u.email === email && u.password === password);

            if (!user) {
                showMessage('Nädogry email ýa-da parol', 'error');
                return;
            }

            // Сохраняем пользователя с правильной ролью
            localStorage.setItem('user', JSON.stringify({
                id: user.id,
                username: user.username,
                email: user.email,
                role: user.role // <-- здесь уже 'admin' или 'user'
            }));

            showMessage('Giriş başaryldy!', 'success');
            setTimeout(() => window.location.href = 'dashboard.html', 1000);
        });
    </script>
</body>
</html>
