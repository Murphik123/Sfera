<!DOCTYPE html>
<html lang="tm">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>СФЕРА — Giriş</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="/css/style.css" />

    <style>
        /* Дополнительные стили для страницы входа */
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 120px 20px 60px;
            background: linear-gradient(135deg, #06111d, #0b2035, #102b45);
        }

        .login-box {
            background: rgba(255,255,255,.06);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,.12);
            border-radius: 24px;
            padding: 50px 40px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 25px 60px rgba(0,0,0,.35);
            animation: fadeUp 0.8s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-box h2 {
            text-align: center;
            font-size: 32px;
            margin-bottom: 8px;
            background: linear-gradient(to right, #fff, #b4d7ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-box .subtitle {
            text-align: center;
            color: #9fb5c8;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #dbe9ff;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,.15);
            background: rgba(255,255,255,.05);
            color: white;
            font-size: 16px;
            transition: .3s;
            outline: none;
        }

        .form-group input:focus {
            border-color: #00d4ff;
            box-shadow: 0 0 20px rgba(0,212,255,.2);
            background: rgba(255,255,255,.08);
        }

        .form-group input::placeholder {
            color: rgba(255,255,255,.3);
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            background: linear-gradient(135deg, #00d4ff, #008cff);
            color: white;
            transition: .35s;
            box-shadow: 0 15px 35px rgba(0,212,255,.3);
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 25px 50px rgba(0,212,255,.5);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .register-link {
            text-align: center;
            margin-top: 25px;
            color: #9fb5c8;
            font-size: 14px;
        }

        .register-link a {
            color: #00d4ff;
            text-decoration: none;
            font-weight: 500;
            transition: .2s;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        .message {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .message.error {
            display: block;
            background: rgba(255,0,0,.15);
            border: 1px solid rgba(255,0,0,.3);
            color: #ff6b6b;
        }

        .message.success {
            display: block;
            background: rgba(0,255,170,.1);
            border: 1px solid rgba(0,255,170,.3);
            color: #00ffa3;
        }

        .logo-icon-small {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .logo-icon-small svg {
            width: 60px;
            height: 60px;
        }

        .password-toggle {
            position: relative;
        }
        .password-toggle input {
            padding-right: 48px;
        }
        .toggle-eye {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: #9fb5c8;
            cursor: pointer;
            font-size: 18px;
            padding: 4px;
        }
        .toggle-eye:hover {
            color: white;
        }
    </style>
</head>
<body>
    <div id="particles"></div>

    <header>
        <div class="container">
            <a href="index.html" class="logo">
                <div class="logo-icon">
                    <svg class="logo-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#00ffa3" />
                                <stop offset="50%" stop-color="#00d4ff" />
                                <stop offset="100%" stop-color="#1f6bff" />
                            </linearGradient>
                            <filter id="logoGlow" x="-30%" y="-30%" width="160%" height="160%">
                                <feGaussianBlur stdDeviation="4" result="blur" />
                                <feComposite in="SourceGraphic" in2="blur" operator="over" />
                            </filter>
                        </defs>
                        <circle cx="50" cy="50" r="28" fill="url(#logoGrad)" opacity="0.15" filter="url(#logoGlow)" />
                        <g filter="url(#logoGlow)">
                            <circle cx="50" cy="50" r="40" stroke="url(#logoGrad)" stroke-width="2.5" stroke-dasharray="1 5" stroke-linecap="round" opacity="0.4" />
                            <path d="M50 12 C72 12, 88 28, 88 50 C88 72, 68 88, 46 86 C26 84, 14 66, 16 46 C18 28, 34 16, 52 18 C68 20, 78 34, 76 50 C74 64, 62 74, 48 72 C36 70, 28 58, 30 46 C32 36, 42 28, 52 30 C60 32, 66 40, 64 50 C62 58, 54 62, 46 60" stroke="url(#logoGrad)" stroke-width="3" stroke-linecap="round" stroke-dasharray="1 6" />
                            <circle cx="48" cy="48" r="3.5" fill="#ffffff" filter="url(#logoGlow)" />
                        </g>
                    </svg>
                </div>
                <div class="logo-text">
                    <h2 data-i18n="logo_title">SFERA</h2>
                    <p data-i18n="logo_subtitle">Milli Sanly Platforma</p>
                </div>
            </a>

            <div class="header-buttons">
                <button class="lang" id="langBtn">TM</button>
            </div>
        </div>
    </header>

    <section class="login-page">
        <div class="login-box">
            <div class="logo-icon-small">
                <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="smallGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#00ffa3" />
                            <stop offset="50%" stop-color="#00d4ff" />
                            <stop offset="100%" stop-color="#1f6bff" />
                        </linearGradient>
                    </defs>
                    <circle cx="50" cy="50" r="30" fill="url(#smallGrad)" opacity="0.15" />
                    <path d="M50 12 C72 12, 88 28, 88 50 C88 72, 68 88, 46 86 C26 84, 14 66, 16 46 C18 28, 34 16, 52 18 C68 20, 78 34, 76 50 C74 64, 62 74, 48 72 C36 70, 28 58, 30 46 C32 36, 42 28, 52 30 C60 32, 66 40, 64 50 C62 58, 54 62, 46 60" stroke="url(#smallGrad)" stroke-width="3.5" stroke-linecap="round" stroke-dasharray="1 5" />
                    <circle cx="48" cy="48" r="4" fill="#ffffff" />
                </svg>
            </div>

            <h2 data-i18n="login_title">Giriş</h2>
            <p class="subtitle" data-i18n="login_subtitle">Platforma girmek üçin hasabyňyzy ulanyň</p>

            <div id="message" class="message"></div>

            <form id="loginForm" novalidate>
                <div class="form-group">
                    <label for="email" data-i18n="login_email_label">Email ýa-da ulanyjy ady</label>
                    <input type="text" id="email" name="email" placeholder="email@example.com" required />
                </div>

                <div class="form-group password-toggle">
                    <label for="password" data-i18n="login_password_label">Parol</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required />
                    <button type="button" class="toggle-eye" id="togglePassword" aria-label="Show password">👁️</button>
                </div>

                <button type="submit" class="login-btn" id="loginBtn" data-i18n="login_button">Girmek</button>
            </form>

            <div class="register-link">
                <span data-i18n="login_no_account">Hasabyňyz ýokmy?</span>
                <a href="register.html" data-i18n="login_register_link">Hasap dörediň</a>
            </div>
        </div>
    </section>

    <script>
        // ============================================================
        // ПЕРЕВОДЫ ДЛЯ СТРАНИЦЫ ВХОДА (только нужные ключи)
        // ============================================================
        const translations = {
            tm: {
                logo_title: "SFERA",
                logo_subtitle: "Milli Sanly Platforma",
                login_title: "Giriş",
                login_subtitle: "Platforma girmek üçin hasabyňyzy ulanyň",
                login_email_label: "Email ýa-da ulanyjy ady",
                login_password_label: "Parol",
                login_button: "Girmek",
                login_no_account: "Hasabyňyz ýokmy?",
                login_register_link: "Hasap dörediň",
                login_error: "Nädogry email ýa-da parol",
                login_success: "Giriş başaryldy!",
                login_loading: "Girilýär..."
            },
            ru: {
                logo_title: "СФЕРА",
                logo_subtitle: "Национальная Цифровая Платформа",
                login_title: "Вход",
                login_subtitle: "Используйте свою учётную запись для входа на платформу",
                login_email_label: "Email или имя пользователя",
                login_password_label: "Пароль",
                login_button: "Войти",
                login_no_account: "Нет аккаунта?",
                login_register_link: "Зарегистрироваться",
                login_error: "Неверный email или пароль",
                login_success: "Вход выполнен!",
                login_loading: "Вход..."
            },
            en: {
                logo_title: "SFERA",
                logo_subtitle: "National Digital Platform",
                login_title: "Login",
                login_subtitle: "Use your account to access the platform",
                login_email_label: "Email or username",
                login_password_label: "Password",
                login_button: "Login",
                login_no_account: "Don't have an account?",
                login_register_link: "Sign up",
                login_error: "Invalid email or password",
                login_success: "Login successful!",
                login_loading: "Logging in..."
            }
        };

        // ============================================================
        // УСТАНОВКА ЯЗЫКА
        // ============================================================
        let currentLang = localStorage.getItem('lang') || 'tm';

        function setLanguage(lang) {
            if (!translations[lang]) return;
            currentLang = lang;
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang][key]) {
                    if (el.innerHTML.includes('<br>')) {
                        el.innerHTML = translations[lang][key];
                    } else {
                        el.textContent = translations[lang][key];
                    }
                }
            });
            document.getElementById('langBtn').textContent = lang.toUpperCase();
            localStorage.setItem('lang', lang);
        }

        // ============================================================
        // КНОПКА ПЕРЕКЛЮЧЕНИЯ ЯЗЫКА
        // ============================================================
        const langBtn = document.getElementById('langBtn');
        const langCycle = ['tm', 'ru', 'en'];
        let langIndex = langCycle.indexOf(currentLang);
        if (langIndex === -1) langIndex = 0;

        langBtn.addEventListener('click', function() {
            langIndex = (langIndex + 1) % langCycle.length;
            setLanguage(langCycle[langIndex]);
        });

        // ============================================================
        // ПОКАЗ/СКРЫТИЕ ПАРОЛЯ
        // ============================================================
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.textContent = type === 'password' ? '👁️' : '🙈';
        });

        // ============================================================
        // ОБРАБОТКА ФОРМЫ
        // ============================================================
        const form = document.getElementById('loginForm');
        const messageEl = document.getElementById('message');
        const loginBtn = document.getElementById('loginBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!email || !password) {
                showMessage(translations[currentLang].login_error || 'Please fill all fields', 'error');
                return;
            }

            // Блокируем кнопку и показываем загрузку
            loginBtn.disabled = true;
            loginBtn.textContent = translations[currentLang].login_loading || 'Logging in...';

            try {
                const response = await fetch('https://sfera-1.onrender.com/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // Сохраняем токен и информацию о пользователе
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    showMessage(translations[currentLang].login_success || 'Login successful!', 'success');
                    // Перенаправляем через 1 секунду
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1000);
                } else {
                    showMessage(data.message || translations[currentLang].login_error || 'Login failed', 'error');
                    loginBtn.disabled = false;
                    loginBtn.textContent = translations[currentLang].login_button || 'Login';
                }
            } catch (error) {
                console.error('Login error:', error);
                showMessage('Network error. Please try again.', 'error');
                loginBtn.disabled = false;
                loginBtn.textContent = translations[currentLang].login_button || 'Login';
            }
        });

        function showMessage(text, type) {
            messageEl.textContent = text;
            messageEl.className = 'message ' + type;
            messageEl.style.display = 'block';
            // Скрыть через 5 секунд
            clearTimeout(window.messageTimeout);
            window.messageTimeout = setTimeout(() => {
                messageEl.style.display = 'none';
            }, 5000);
        }

        // ============================================================
        // ИНИЦИАЛИЗАЦИЯ
        // ============================================================
        document.addEventListener('DOMContentLoaded', () => {
            setLanguage(currentLang);
        });

        // Переиспользуем частицы из главной страницы (можно добавить, но они уже есть в body)
        // Если нужно, копируем логику частиц, но они уже есть в index.html – на этой странице они тоже работают.
        // Для простоты оставляем как есть – #particles уже присутствует.
        const particles = document.getElementById('particles');
        if (particles) {
            // Если частицы не созданы, создадим (как в main.js)
            if (particles.children.length === 0) {
                for (let i = 0; i < 60; i++) {
                    const p = document.createElement('span');
                    p.className = 'particle';
                    p.style.left = Math.random() * 100 + '%';
                    p.style.top = Math.random() * 100 + '%';
                    p.style.animationDuration = (6 + Math.random() * 12) + 's';
                    p.style.animationDelay = Math.random() * 5 + 's';
                    particles.appendChild(p);
                }
            }
        }

        console.log('Login page loaded');
    </script>
</body>
</html>
