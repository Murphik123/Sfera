<!DOCTYPE html>
<html lang="tm">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>СФЕРА — Giriş / Вход</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body {
            background: #060911;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
            padding: 20px;
        }

        /* Интерактивный фон Canvas */
        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* Объемные пульсирующие неоновые сферы */
        .ambient-glow {
            position: fixed;
            border-radius: 50%;
            filter: blur(130px);
            z-index: 0;
            pointer-events: none;
            animation: pulseGlow 10s infinite alternate ease-in-out;
        }

        .glow-1 {
            width: 500px;
            height: 500px;
            background: rgba(0, 255, 163, 0.16);
            top: -120px;
            left: -120px;
        }

        .glow-2 {
            width: 550px;
            height: 550px;
            background: rgba(0, 212, 255, 0.15);
            bottom: -150px;
            right: -150px;
            animation-delay: -5s;
        }

        @keyframes pulseGlow {
            0% { transform: scale(1) translate(0, 0); opacity: 0.6; }
            100% { transform: scale(1.25) translate(40px, -30px); opacity: 0.95; }
        }

        /* Полный Glassmorphism карточки */
        .auth-container {
            width: 100%;
            max-width: 440px;
            background: rgba(10, 18, 32, 0.65);
            border: 1px solid rgba(0, 212, 255, 0.2);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border-radius: 28px;
            padding: 42px 36px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.7), inset 0 0 20px rgba(0, 212, 255, 0.05);
            position: relative;
            z-index: 2;
            overflow: hidden;
        }

        /* Неоновая полоса по верху карточки */
        .auth-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00ffa3, #00d4ff, transparent);
        }

        .auth-header { text-align: center; margin-bottom: 28px; }

        .logo-wrap {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 18px;
            text-decoration: none;
        }

        .logo-svg {
            width: 50px;
            height: 50px;
            filter: drop-shadow(0 0 12px rgba(0,212,255,0.6));
            animation: logoFloat 4s ease-in-out infinite alternate;
        }

        @keyframes logoFloat {
            0% { transform: translateY(0); }
            100% { transform: translateY(-5px); }
        }

        .logo-text h2 {
            font-size: 26px;
            font-weight: 900;
            background: linear-gradient(135deg, #00ffa3 0%, #00d4ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1.5px;
            text-align: left;
        }

        .logo-text p {
            font-size: 10px;
            color: #9fb5c8;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .auth-title { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 6px; }
        .auth-subtitle { font-size: 13px; color: #8a9eb2; }

        .lang-switch-top { position: absolute; top: 20px; right: 20px; z-index: 10; }
        .lang-btn {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            padding: 7px 14px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 700;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }
        .lang-btn:hover {
            background: rgba(0, 212, 255, 0.2);
            border-color: #00d4ff;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.4);
        }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; color: #b0c4de; margin-bottom: 8px; font-weight: 500; }

        .input-wrap { position: relative; }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            padding-right: 44px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 14px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            border-color: #00d4ff;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            opacity: 0.6;
            font-size: 16px;
            user-select: none;
            transition: opacity 0.2s;
        }
        .toggle-password:hover { opacity: 1; }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #00d4ff 0%, #0066ff 100%);
            border: none;
            border-radius: 14px;
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(0, 212, 255, 0.35);
            margin-top: 10px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 30px rgba(0, 212, 255, 0.55);
            filter: brightness(1.1);
        }

        .auth-footer { margin-top: 25px; text-align: center; font-size: 13px; color: #8a9eb2; }
        .auth-footer a { color: #00d4ff; text-decoration: none; font-weight: 600; margin-left: 5px; transition: 0.2s; }
        .auth-footer a:hover { color: #00ffa3; text-shadow: 0 0 8px rgba(0, 255, 163, 0.5); }

        .message {
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        .message.error { background: rgba(255, 77, 77, 0.15); border: 1px solid rgba(255, 77, 77, 0.4); color: #ff6b6b; }
        .message.success { background: rgba(0, 255, 163, 0.15); border: 1px solid rgba(0, 255, 163, 0.4); color: #00ffa3; }

        .hint-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px dashed rgba(0, 212, 255, 0.2);
            padding: 12px;
            border-radius: 12px;
            font-size: 11px;
            color: #8a9eb2;
            margin-top: 18px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <!-- Фоновые визуальные эффекты -->
    <canvas id="bgCanvas"></canvas>
    <div class="ambient-glow glow-1"></div>
    <div class="ambient-glow glow-2"></div>

    <div class="lang-switch-top">
        <button class="lang-btn" id="langBtn">TM</button>
    </div>

    <div class="auth-container">
        <div class="auth-header">
            <a href="index.html" class="logo-wrap">
                <svg class="logo-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#00ffa3"/>
                            <stop offset="50%" stop-color="#00d4ff"/>
                            <stop offset="100%" stop-color="#1f6bff"/>
                        </linearGradient>
                    </defs>
                    <circle cx="50" cy="50" r="28" fill="url(#logoGrad)" opacity="0.15"/>
                    <path d="M50 12 C72 12, 88 28, 88 50 C88 72, 68 88, 46 86 C26 84, 14 66, 16 46 C18 28, 34 16, 52 18 C68 20, 78 34, 76 50 C74 64, 62 74, 48 72 C36 70, 28 58, 30 46 C32 36, 42 28, 52 30 C60 32, 66 40, 64 50 C62 58, 54 62, 46 60" stroke="url(#logoGrad)" stroke-width="3"/>
                    <circle cx="48" cy="48" r="3.5" fill="#ffffff"/>
                </svg>
                <div class="logo-text">
                    <h2>SFERA</h2>
                    <p>Milli Platforma</p>
                </div>
            </a>
            <h1 class="auth-title" data-i18n="login_title">Giriş</h1>
            <p class="auth-subtitle" data-i18n="login_subtitle">Platforma girmek üçin hasabyňyzy ulanyň</p>
        </div>

        <div id="message" class="message"></div>

        <form id="loginForm">
            <div class="form-group">
                <label data-i18n="login_email_label">Email adres</label>
                <div class="input-wrap">
                    <input type="email" id="email" class="form-input" placeholder="admin@dtm.tm" required />
                </div>
            </div>

            <div class="form-group">
                <label data-i18n="login_password_label">Parol</label>
                <div class="input-wrap">
                    <input type="password" id="password" class="form-input" value="99363645817" required />
                    <span class="toggle-password" id="togglePassword">👁️</span>
                </div>
            </div>

            <button type="submit" class="btn-submit" id="loginBtn" data-i18n="login_button">Girmek</button>
        </form>

        <div class="hint-box">
            🔑 <strong style="color:#00ffa3;">Админ доступ:</strong> admin@dtm.tm / 99363645817<br>
            💡 Или войдите под любым созданным аккаунтом.
        </div>

        <div class="auth-footer">
            <span data-i18n="login_no_account">Hasabyňyz ýokmy?</span>
            <a href="register.html" data-i18n="login_register_link">Hasap dörediň</a>
        </div>
    </div>

    <!-- Анимационный скрипт частичек Canvas -->
    <script>
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        const particles = [];
        const particleCount = 55;

        for (let i = 0; i < particleCount; i++) {
            particles.push({
                x: Math.random() * width,
                y: Math.random() * height,
                vx: (Math.random() - 0.5) * 0.7,
                vy: (Math.random() - 0.5) * 0.7,
                radius: Math.random() * 2 + 1,
                color: Math.random() > 0.5 ? '#00ffa3' : '#00d4ff'
            });
        }

        function drawParticles() {
            ctx.clearRect(0, 0, width, height);

            for (let i = 0; i < particleCount; i++) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;

                if (p.x < 0 || p.x > width) p.vx *= -1;
                if (p.y < 0 || p.y > height) p.vy *= -1;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.shadowColor = p.color;
                ctx.shadowBlur = 10;
                ctx.fill();

                for (let j = i + 1; j < particleCount; j++) {
                    let p2 = particles[j];
                    let dist = Math.hypot(p.x - p2.x, p.y - p2.y);
                    if (dist < 130) {
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.strokeStyle = `rgba(0, 212, 255, ${1 - dist / 130 * 0.8})`;
                        ctx.lineWidth = 0.6;
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(drawParticles);
        }
        drawParticles();

        // Логика авторизации
        (function initSystemUsers() {
            let users = JSON.parse(localStorage.getItem('users') || '[]');
            if (!users.some(u => u.email === 'admin@dtm.tm')) {
                users.push({
                    id: 'admin-001',
                    username: 'System Admin',
                    email: 'admin@dtm.tm',
                    password: '99363645817',
                    role: 'admin',
                    userType: 'gov',
                    createdAt: new Date().toISOString()
                });
                localStorage.setItem('users', JSON.stringify(users));
            }
        })();

        const translations = {
            tm: {
                login_title: "Giriş",
                login_subtitle: "Platforma girmek üçin hasabyňyzy ulanyň",
                login_email_label: "Email adres",
                login_password_label: "Parol",
                login_button: "Girmek",
                login_no_account: "Hasabyňyz ýokmy?",
                login_register_link: "Hasap dörediň",
                login_error: "Nädogry email ýa-da parol",
                login_success: "Giriş başaryldy!",
                login_loading: "Girilýär..."
            },
            ru: {
                login_title: "Вход в систему",
                login_subtitle: "Используйте свою учётную запись SFERA",
                login_email_label: "Электронная почта",
                login_password_label: "Пароль",
                login_button: "Войти",
                login_no_account: "Нет аккаунта?",
                login_register_link: "Зарегистрироваться",
                login_error: "Неверный email или пароль",
                login_success: "Вход выполнен успешно!",
                login_loading: "Выполняется вход..."
            },
            en: {
                login_title: "Login",
                login_subtitle: "Enter your account details to access",
                login_email_label: "Email address",
                login_password_label: "Password",
                login_button: "Sign In",
                login_no_account: "Don't have an account?",
                login_register_link: "Register now",
                login_error: "Invalid email or password",
                login_success: "Login successful!",
                login_loading: "Logging in..."
            }
        };

        let currentLang = localStorage.getItem('lang') || 'tm';

        function setLanguage(lang) {
            if (!translations[lang]) return;
            currentLang = lang;
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang][key]) el.textContent = translations[lang][key];
            });
            document.getElementById('langBtn').textContent = lang.toUpperCase();
            localStorage.setItem('lang', lang);
        }

        document.getElementById('langBtn').addEventListener('click', function() {
            const cycle = ['tm', 'ru', 'en'];
            let idx = cycle.indexOf(currentLang);
            idx = (idx + 1) % cycle.length;
            setLanguage(cycle[idx]);
        });

        document.getElementById('togglePassword').addEventListener('click', function() {
            const p = document.getElementById('password');
            p.type = p.type === 'password' ? 'text' : 'password';
            this.textContent = p.type === 'password' ? '👁️' : '🙈';
        });

        const form = document.getElementById('loginForm');
        const messageEl = document.getElementById('message');
        const loginBtn = document.getElementById('loginBtn');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!email || !password) {
                showMessage(translations[currentLang].login_error, 'error');
                return;
            }

            loginBtn.disabled = true;
            loginBtn.textContent = translations[currentLang].login_loading;

            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const user = users.find(u => u.email.toLowerCase() === email.toLowerCase() && u.password === password);

            if (!user) {
                showMessage(translations[currentLang].login_error, 'error');
                loginBtn.disabled = false;
                loginBtn.textContent = translations[currentLang].login_button;
                return;
            }

            localStorage.setItem('token', 'sfera-token-' + Date.now());
            localStorage.setItem('user', JSON.stringify({
                id: user.id,
                username: user.username,
                email: user.email,
                role: user.role,
                userType: user.userType || 'private'
            }));

            showMessage(translations[currentLang].login_success, 'success');
            setTimeout(() => { window.location.href = 'marketplace.html'; }, 800);
        });

        function showMessage(text, type) {
            messageEl.textContent = text;
            messageEl.className = 'message ' + type;
            messageEl.style.display = 'block';
            setTimeout(() => { messageEl.style.display = 'none'; }, 4000);
        }

        setLanguage(currentLang);
    </script>
</body>
</html>
